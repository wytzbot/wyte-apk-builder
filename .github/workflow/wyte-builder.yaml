name: Wyte URL to APK Builder

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Website URL to convert'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      # Decode keystore from GitHub Secret
      - name: Setup Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > android.keystore

      - name: Init PWA and Build Signed AAB
        run: |
          yes | bubblewrap init \
            --manifest="${{ inputs.app_url }}/manifest.json" \
            --directory=./app \
            --skipPwaValidation
          
          cd ./app
          bubblewrap build --skipPwaValidation \
            --keystore=../android.keystore \
            --keystore-password=${{ secrets.KEYSTORE_PASSWORD }} \
            --key-alias=${{ secrets.KEY_ALIAS }} \
            --key-alias-password=${{ secrets.KEY_ALIAS_PASSWORD }}

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-signed-aab
          path: ./app/*.
