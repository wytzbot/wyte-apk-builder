name: Build Wyte APK

on:
  workflow_dispatch:  # <-- allows manual run from Actions tab
    inputs:
      app_url:
        description: 'Your PWA/Website URL'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      package_name:
        description: 'Package name e.g com.wyte.myapp'
        required: true
        type: string
  push:
    branches: [ main ]  # auto build when you push to main

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init PWA with TWA
        run: |
          bubblewrap init \
            --manifest="${{ inputs.app_url }}/manifest.json" \
            --directory=./app \
            --packageName="${{ inputs.package_name }}" \
            --appName="${{ inputs.app_name }}" \
            --shortName="${{ inputs.app_name }}" \
            --skipPwaValidation \
            --force \
            --enableAutoVerify \
            --enableSiteSettingsShortcut \
            --signingKeyPath=./android.keystore \
            --signingKeyAlias=wyte \
            --signingKeyStorePassword=${{ secrets.KEYSTORE_PASSWORD }} \
            --signingKeyPassword=${{ secrets.KEY_PASSWORD }}

      - name: Build APK
        working-directory: ./app
        run: bubblewrap build

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-release.apk
          path: ./app/app-release-signed.apk
