name: Wyte APK Builder
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
        
      - run: npm i -g @capacitor/cli
        
      - run: npx cap init "WyteApp" "com.wyte.app" --web-dir=www
      
      - name: Create index.html
        run: |
          mkdir www
          echo '<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{background:#111;color:#fff;font-family:sans-serif;text-align:center;padding:40px}h1{color:#00ff88}.btn{display:block;background:#00ff88;color:#000;padding:20px;margin:15px;border-radius:15px;text-decoration:none;font-weight:bold}</style></head><body><h1>🚀 WYTE HUB</h1><a class="btn" href="https://wytzbot.github.io/wyedit">WyEdit</a><a class="btn" href="https://google.com">ToluNote</a><a class="btn" href="https://google.com">Other App</a></body></html>' > www/index.html
          
      - run: npx cap add android
      
      - run: cd android && chmod +x gradlew && ./gradlew assembleRelease
      
      - uses: actions/upload-artifact@v4
        with:
          name: WyteHub-APK
          path: android/app/build/outputs/apk/release/app-release.apk
