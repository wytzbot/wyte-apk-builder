name: Wyte URL to APK Builder

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Website URL to convert'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      package_name:
        description: 'Android package name (e.g. com.example.app)'
        required: true
        type: string
      version_name:
        description: 'Version name'
        required: false
        type: string
        default: '1.0.0'
      version_code:
        description: 'Version code'
        required: false
        type: string
        default: '1'
      orientation:
        description: 'Screen orientation'
        required: false
        type: string
        default: 'default'
      theme_color:
        description: 'Theme color (hex)'
        required: false
        type: string
        default: '#000000'
      background_color:
        description: 'Background color (hex)'
        required: false
        type: string
        default: '#FFFFFF'
      display_mode:
        description: 'Display mode'
        required: false
        type: string
        default: 'standalone'
      icon_url:
        description: 'Icon URL (optional, auto-detected from site if blank)'
        required: false
        type: string
        default: ''
      start_url:
        description: 'Start path'
        required: false
        type: string
        default: '/'
      enable_notifications:
        description: 'Enable push notification delegation'
        required: false
        type: string
        default: 'false'
      fallback_type:
        description: 'Fallback renderer (customtabs|webview)'
        required: false
        type: string
        default: 'customtabs'
      build_id:
        description: 'Internal correlation ID set by the app — leave blank for manual runs'
        required: false
        type: string
        default: ''

run-name: "${{ inputs.app_name }} (${{ inputs.build_id || 'manual' }})"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate a signing key for this build
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias wyte \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass wytebuilder -keypass wytebuilder \
            -dname "CN=${{ inputs.app_name }}, OU=Wyte, O=Wyte, L=NA, S=NA, C=US"

      - name: Generate TWA manifest
        run: |
          mkdir -p app
          HOST=$(echo "${{ inputs.app_url }}" | sed -E 's#https?://##' | cut -d/ -f1)
          cat > app/twa-manifest.json <<EOF
          {
            "packageId": "${{ inputs.package_name }}",
            "host": "$HOST",
            "name": "${{ inputs.app_name }}",
            "launcherName": "${{ inputs.app_name }}",
            "display": "${{ inputs.display_mode }}",
            "orientation": "${{ inputs.orientation }}",
            "themeColor": "${{ inputs.theme_color }}",
            "navigationColor": "${{ inputs.theme_color }}",
            "backgroundColor": "${{ inputs.background_color }}",
            "startUrl": "${{ inputs.start_url }}",
            "iconUrl": "${{ inputs.icon_url }}",
            "enableNotifications": ${{ inputs.enable_notifications }},
            "fallbackType": "${{ inputs.fallback_type }}",
            "appVersionName": "${{ inputs.version_name }}",
            "appVersionCode": ${{ inputs.version_code }},
            "signingKey": {
              "path": "../android.keystore",
              "alias": "wyte"
            }
          }
          EOF

      - name: Build signed APK/AAB
        working-directory: ./app
        run: |
          bubblewrap build --skipPwaValidation \
            --keystore=../android.keystore \
            --keystore-password=wytebuilder \
            --key-alias=wyte \
            --key-alias-password=wytebuilder

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-${{ inputs.build_id || github.run_id }}
          path: |
            app/app-release-signed.apk
            app/app-release-bundle.aab
          if-no-files-found: warn
